<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affirmations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf9f7;
    color: #2c2c2c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 32px;
    color: #1a1a1a;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 540px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 20px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-weight: 600;
  }

  /* Sync status */
  #sync-status {
    font-size: 0.78rem;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #sync-status.syncing { color: #a78bfa; }
  #sync-status.error   { color: #f87171; }
  #sync-status.ok      { color: #34d399; }

  /* Affirmations list */
  #affirmation-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #affirmation-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f5f4f2;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.95rem;
    line-height: 1.4;
  }

  #affirmation-list li span {
    flex: 1;
    outline: none;
    cursor: text;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: #e05555; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  #new-affirmation {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e0dedd;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: inherit;
    background: #faf9f7;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-affirmation:focus { border-color: #a78bfa; }

  .btn-add {
    padding: 10px 18px;
    background: #a78bfa;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #8b5cf6; }

  /* Practice settings */
  .settings-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 10px 14px;
    margin-bottom: 16px;
  }

  .settings-grid label {
    font-size: 0.95rem;
    color: #555;
    white-space: nowrap;
  }

  .settings-grid select {
    padding: 8px 12px;
    border: 1.5px solid #e0dedd;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    background: #faf9f7;
    outline: none;
    cursor: pointer;
    width: fit-content;
  }

  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #e0dedd; border-radius: 22px;
    cursor: pointer; transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: #a78bfa; }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: white; border-radius: 50%;
    transition: transform 0.2s; pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

  .btn-practice {
    width: 100%;
    padding: 13px;
    background: #34d399;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .btn-practice:hover { background: #10b981; }
  .btn-practice.stop { background: #f87171; }
  .btn-practice.stop:hover { background: #ef4444; }

  /* Practice display */
  #practice-display { display: none; flex-direction: column; align-items: center; text-align: center; padding: 8px 0 0; }
  #practice-display.active { display: flex; }

  #current-affirmation {
    font-size: 1.35rem; font-weight: 500; line-height: 1.5; color: #1a1a1a;
    min-height: 80px; display: flex; align-items: center; justify-content: center;
    padding: 0 8px; transition: opacity 0.3s; margin-top: 16px;
  }

  #practice-status { font-size: 0.85rem; color: #888; margin-top: 12px; height: 20px; }

  #timer-display {
    font-size: 2rem; font-weight: 700; color: #a78bfa;
    margin-top: 4px; font-variant-numeric: tabular-nums;
  }

  .progress-bar { width: 100%; height: 4px; background: #e0dedd; border-radius: 2px; margin-top: 20px; overflow: hidden; }
  #progress-fill { height: 100%; background: #a78bfa; border-radius: 2px; transition: width 1s linear; width: 0%; }

  /* GitHub Gist settings */
  .gist-card { border: 1.5px solid #e0dedd; }

  .gist-section { display: flex; flex-direction: column; gap: 10px; }

  .gist-field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  .gist-field input {
    width: 100%;
    padding: 9px 13px;
    border: 1.5px solid #e0dedd;
    border-radius: 9px;
    font-size: 0.9rem;
    font-family: monospace;
    background: #faf9f7;
    outline: none;
    transition: border-color 0.15s;
  }
  .gist-field input:focus { border-color: #a78bfa; }

  .gist-actions { display: flex; gap: 8px; margin-top: 4px; }

  .btn-gist {
    flex: 1;
    padding: 9px 14px;
    border: none;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-gist.primary { background: #a78bfa; color: white; }
  .btn-gist.primary:hover { background: #8b5cf6; }
  .btn-gist.secondary { background: #f0eeec; color: #555; }
  .btn-gist.secondary:hover { background: #e5e3e0; }

  .gist-hint {
    font-size: 0.8rem;
    color: #aaa;
    line-height: 1.5;
    margin-top: 2px;
  }
  .gist-hint a { color: #a78bfa; text-decoration: none; }
  .gist-hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>✨ Affirmations</h1>

<!-- Affirmations list card -->
<div class="card">
  <div class="card-header">
    <h2>My Affirmations</h2>
    <span id="sync-status"></span>
  </div>
  <ul id="affirmation-list"></ul>
  <div class="add-row">
    <input type="text" id="new-affirmation" placeholder="Add a new affirmation…" maxlength="300">
    <button class="btn-add" onclick="addAffirmation()">Add</button>
  </div>
</div>

<!-- Practice mode card -->
<div class="card">
  <h2 style="margin-bottom:16px">Practice Mode</h2>

  <div class="settings-grid">
    <label for="duration-select">Duration</label>
    <select id="duration-select">
      <option value="1">1 min</option>
      <option value="2">2 min</option>
      <option value="3" selected>3 min</option>
      <option value="4">4 min</option>
      <option value="5">5 min</option>
      <option value="6">6 min</option>
      <option value="7">7 min</option>
      <option value="8">8 min</option>
      <option value="9">9 min</option>
      <option value="10">10 min</option>
    </select>

    <label for="pause-select">Pause between</label>
    <select id="pause-select">
      <option value="3" selected>3 sec</option>
      <option value="4">4 sec</option>
      <option value="5">5 sec</option>
      <option value="6">6 sec</option>
    </select>

    <label for="shuffle-toggle">Shuffle</label>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="shuffle-toggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <button class="btn-practice" id="practice-btn" onclick="togglePractice()">▶ Start</button>

  <div id="practice-display">
    <div id="timer-display">0:00</div>
    <div id="current-affirmation"></div>
    <div id="practice-status"></div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
  </div>
</div>

<!-- GitHub Gist sync card -->
<div class="card gist-card">
  <h2 style="margin-bottom:14px">☁️ Cloud Sync (GitHub Gist)</h2>
  <div class="gist-section">
    <div class="gist-field">
      <label>Personal Access Token</label>
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx"
        oninput="saveGistConfig()" autocomplete="off">
    </div>
    <div class="gist-field">
      <label>Gist ID <span style="font-weight:400;text-transform:none;letter-spacing:0">(leave blank to create new)</span></label>
      <input type="text" id="gh-gist-id" placeholder="e.g. 4a8b2c1d…"
        oninput="saveGistConfig()" autocomplete="off">
    </div>
    <p class="gist-hint">
      Token needs only the <strong>gist</strong> scope.
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=Affirmations+App" target="_blank">Create one here →</a>
    </p>
    <div class="gist-actions">
      <button class="btn-gist primary" onclick="syncToGist()">↑ Push to Gist</button>
      <button class="btn-gist secondary" onclick="loadFromGist()">↓ Pull from Gist</button>
    </div>
  </div>
</div>

<script>
  const VERSION = 'v4';
  const DEFAULT_AFFIRMATIONS = [
    "I am a commanding, charismatic comedian.",
    "I lead every room with confidence and ease.",
    "My voice is original, sharp, and necessary.",
    "I 100% trust my preparation, my instincts, and myself completely on stage.",
    "Every day I write, rehearse, and perform with discipline and joy. My hour is in my body.",
    "I look forward to every show because the stage is where I belong.",
    "I am comfortable holding silence. I control the pace of the room.",
    "I stand fully behind my perspective.",
    "I take creative risks that stretch me beyond safe laughs.",
    "I am fully here. My energy is free, my joy is real, and that is enough.",
    "I built something real here. I get to share it tonight. That's it. That's enough.",
    "I survived two communities telling me I didn't belong. I made a whole show about it. The audacity of that is the entire point.",
    "I don't need to be perfect. I need to be present.",
    "The best moments in comedy come from being here, not from executing the plan.",
    "The people in that room came to laugh and feel something. I am giving them exactly that.",
    "My sister showed me what it looks like to take your top off and not care. I am allowed to do the same.",
    "I don't think anything is going to be hard. What is there to lose? Every second I'm there I'm gaining something.",
    "I treat every setback as temporary, limited, and not reflective of me.",
    "My honesty makes my comedy stronger. I allow real emotion on stage.",
    "My writing is precise, disciplined, and structurally strong.",
    "My perspective is culturally sharp and worth paying attention to.",
    "I am steadily building toward the highest rooms in comedy.",
    "My worth as a comedian comes from my craft, growth, and impact.",
    "My body stays steady and powerful on stage. My breath keeps me grounded and in control.",
    "Silence does not threaten me. I stay relaxed, present, and in command no matter what the audience does.",
    "My value as a performer is constant. One set never defines me.",
    "I am funny. It lives in my bones, my instincts, my voice.",
    "My skill is real and measurable. Recognition arrives on its own timeline.",
    "I build work so strong and distinctive that institutions eventually have to respond.",
    "I am not waiting to be chosen — I am becoming undeniable.",
    "When I walk on stage, I focus on connection and presence.",
    "I build elite-level skill through disciplined reps and relentless refinement.",
    "My writing is sharp, structured, and intentional. Every word earns its place.",
    "My voice is current, observant, and deeply tuned to the culture around me.",
    "I am building work and presence that place me in rooms with the best.",
    "Emotional depth means slowing down, sitting in silence, and letting the audience feel before the punchline."
  ];

  const savedVersion = localStorage.getItem('affirmations_version');
  let affirmations;
  if (savedVersion !== VERSION) {
    affirmations = [...DEFAULT_AFFIRMATIONS];
    localStorage.setItem('affirmations_version', VERSION);
    localStorage.setItem('affirmations', JSON.stringify(affirmations));
  } else {
    affirmations = JSON.parse(localStorage.getItem('affirmations')) || [...DEFAULT_AFFIRMATIONS];
  }

  // ── Gist config (stored in localStorage, never in the repo) ────
  function getGistConfig() {
    return {
      token: localStorage.getItem('gh_token') || '',
      gistId: localStorage.getItem('gh_gist_id') || ''
    };
  }

  function saveGistConfig() {
    localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
    localStorage.setItem('gh_gist_id', document.getElementById('gh-gist-id').value.trim());
  }

  function setSyncStatus(state, msg) {
    const el = document.getElementById('sync-status');
    el.className = state;
    el.textContent = msg;
  }

  async function loadFromGist() {
    const { token, gistId } = getGistConfig();
    if (!token || !gistId) {
      setSyncStatus('error', '⚠ Add token + Gist ID first');
      return;
    }
    setSyncStatus('syncing', '⟳ Pulling…');
    try {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      const file = data.files['affirmations.json'];
      if (!file) throw new Error('affirmations.json not found in Gist');
      affirmations = JSON.parse(file.content);
      localStorage.setItem('affirmations', JSON.stringify(affirmations));
      renderList();
      setSyncStatus('ok', '✓ Pulled');
      setTimeout(() => setSyncStatus('', ''), 3000);
    } catch (e) {
      setSyncStatus('error', `⚠ ${e.message}`);
    }
  }

  async function syncToGist() {
    const { token, gistId } = getGistConfig();
    if (!token) { setSyncStatus('error', '⚠ Add token first'); return; }
    setSyncStatus('syncing', '⟳ Pushing…');
    try {
      const body = {
        description: 'Affirmations App',
        public: false,
        files: { 'affirmations.json': { content: JSON.stringify(affirmations, null, 2) } }
      };
      let res, data;
      if (gistId) {
        // Update existing gist
        res = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
      } else {
        // Create new gist
        res = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
      }
      if (!res.ok) throw new Error(res.status);
      data = await res.json();
      // If newly created, save the ID
      if (!gistId) {
        localStorage.setItem('gh_gist_id', data.id);
        document.getElementById('gh-gist-id').value = data.id;
      }
      setSyncStatus('ok', '✓ Saved to Gist');
      setTimeout(() => setSyncStatus('', ''), 3000);
    } catch (e) {
      setSyncStatus('error', `⚠ ${e.message}`);
    }
  }

  // ── Affirmations list ──────────────────────────────────────────
  function save() {
    localStorage.setItem('affirmations', JSON.stringify(affirmations));
  }

  function renderList() {
    const ul = document.getElementById('affirmation-list');
    ul.innerHTML = '';
    affirmations.forEach((text, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span contenteditable="true" spellcheck="false"
          onblur="editAffirmation(${i}, this.innerText.trim())"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${escHtml(text)}</span>
        <button class="delete-btn" onclick="deleteAffirmation(${i})" title="Remove">✕</button>
      `;
      ul.appendChild(li);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addAffirmation() {
    const inp = document.getElementById('new-affirmation');
    const text = inp.value.trim();
    if (!text) return;
    affirmations.push(text);
    save();
    renderList();
    inp.value = '';
    inp.focus();
  }

  function deleteAffirmation(i) {
    affirmations.splice(i, 1);
    save();
    renderList();
  }

  function editAffirmation(i, newText) {
    if (!newText) deleteAffirmation(i);
    else { affirmations[i] = newText; save(); }
  }

  document.getElementById('new-affirmation').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAffirmation();
  });

  // ── Practice Mode ──────────────────────────────────────────────
  let practiceActive = false;
  let practiceTimeout = null;
  let timerInterval = null;
  let remainingSeconds = 0;
  let totalSeconds = 0;
  let practiceQueue = [];
  let queueIndex = 0;

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQueue() {
    return document.getElementById('shuffle-toggle').checked
      ? shuffleArray(affirmations) : [...affirmations];
  }

  function togglePractice() {
    practiceActive ? stopPractice() : startPractice();
  }

  function startPractice() {
    if (affirmations.length === 0) { alert('Add at least one affirmation first!'); return; }
    practiceActive = true;
    queueIndex = 0;
    practiceQueue = buildQueue();
    const mins = parseInt(document.getElementById('duration-select').value);
    totalSeconds = mins * 60;
    remainingSeconds = totalSeconds;
    document.getElementById('practice-btn').textContent = '■ Stop';
    document.getElementById('practice-btn').classList.add('stop');
    document.getElementById('practice-display').classList.add('active');
    document.getElementById('duration-select').disabled = true;
    document.getElementById('pause-select').disabled = true;
    document.getElementById('shuffle-toggle').disabled = true;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      remainingSeconds--;
      updateTimerDisplay();
      updateProgress();
      if (remainingSeconds <= 0) stopPractice(true);
    }, 1000);
    speakNext();
  }

  function stopPractice(finished = false) {
    practiceActive = false;
    clearTimeout(practiceTimeout);
    clearInterval(timerInterval);
    window.speechSynthesis.cancel();
    document.getElementById('practice-btn').textContent = '▶ Start';
    document.getElementById('practice-btn').classList.remove('stop');
    document.getElementById('practice-display').classList.remove('active');
    document.getElementById('duration-select').disabled = false;
    document.getElementById('pause-select').disabled = false;
    document.getElementById('shuffle-toggle').disabled = false;
    document.getElementById('progress-fill').style.width = '0%';
    if (finished) setTimeout(() => alert('Great work! Practice session complete. 🌟'), 100);
  }

  function speakNext() {
    if (!practiceActive || remainingSeconds <= 0) return;
    if (queueIndex >= practiceQueue.length) {
      queueIndex = 0;
      practiceQueue = buildQueue();
    }
    const text = practiceQueue[queueIndex++];
    const pauseSec = parseInt(document.getElementById('pause-select').value);
    setDisplayText(text);
    setStatus('🔊 Listening…');
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.voice = getBestVoice();
    utterance.rate = 0.82;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;
    utterance.onend = () => {
      if (!practiceActive) return;
      setStatus(`🤫 Your turn… (${pauseSec} sec)`);
      practiceTimeout = setTimeout(() => { if (practiceActive) speakNext(); }, pauseSec * 1000);
    };
    utterance.onerror = () => { if (practiceActive) practiceTimeout = setTimeout(speakNext, 500); };
    window.speechSynthesis.speak(utterance);
  }

  function setDisplayText(text) {
    const el = document.getElementById('current-affirmation');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 200);
  }

  function setStatus(msg) { document.getElementById('practice-status').textContent = msg; }

  function updateTimerDisplay() {
    const m = Math.floor(remainingSeconds / 60);
    const s = remainingSeconds % 60;
    document.getElementById('timer-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }

  function updateProgress() {
    document.getElementById('progress-fill').style.width =
      `${((totalSeconds - remainingSeconds) / totalSeconds) * 100}%`;
  }

  // ── Voice selection ────────────────────────────────────────────
  const PREFERRED_VOICES = [
    'Samantha','Karen','Moira','Tessa',
    'Google US English','Google UK English Female','Google UK English Male',
    'Microsoft Aria Online (Natural)','Microsoft Jenny Online (Natural)',
    'Microsoft Guy Online (Natural)','Microsoft Zira','Microsoft David',
    'Alex','Victoria','Allison','Ava','Susan','Nicky',
  ];
  let cachedVoice = null;
  function getBestVoice() {
    if (cachedVoice) return cachedVoice;
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const name of PREFERRED_VOICES) {
      const match = voices.find(v => v.name === name || v.name.startsWith(name));
      if (match) { cachedVoice = match; return match; }
    }
    return voices.find(v => v.lang.startsWith('en') && !v.name.match(/\d/)) || voices[0];
  }
  window.speechSynthesis.onvoiceschanged = () => { cachedVoice = null; };
  window.speechSynthesis.getVoices();

  // ── Init ───────────────────────────────────────────────────────
  renderList();
  // Restore saved Gist config into fields
  const cfg = getGistConfig();
  if (cfg.token) document.getElementById('gh-token').value = cfg.token;
  if (cfg.gistId) document.getElementById('gh-gist-id').value = cfg.gistId;
  // Auto-pull on load if configured
  if (cfg.token && cfg.gistId) loadFromGist();
</script>
</body>
</html>
